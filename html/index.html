<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
    <script src="../js/index.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: content-box;
        }

        html {
            background-image: linear-gradient(to bottom, red, orange, yellow, green, blue, violet, purple, red);
            background-repeat: repeat-y;
            background-size: 100dvw 200dvh;
            animation: runner 10s linear infinite;
            max-height: 100dvh;

            color: white;
        }

        h1 {
            position: fixed;
            text-align: center;
            animation: rotate 6s linear infinite;
            font-size: 4rem;
            right: 30%;
        }

        body {
            display: flex;
            flex-direction: column;
            margin-top: 40dvh;
        }

        @keyframes rotate {
            0% {
                transform: rotateZ(0deg);
            }
            
            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes runner {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 0 200dvh;
            }
        }
    </style>
</head>
<body>
    <h1>Hân vip hơn mức cho phép.</h1>
</body>
</html>
